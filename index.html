<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Smartwatch Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Health Smartwatch Dashboard</h1>
  </header>

  <main>
    <section class="stats">
      <div class="card">
        <h2>Heart Rate</h2>
        <p>78 bpm</p>
      </div>
      <div class="card">
        <h2>Steps</h2>
        <p>5,432</p>
      </div>
      <div class="card">
        <h2>Calories</h2>
        <p>320 kcal</p>
      </div>
    </section>

    <section class="activity">
      <h2>Daily Activity</h2>
      <div class="chart-placeholder">[Chart Area]</div>
    </section>
  </main>

  <footer>
    <p>© 2026 Health Smartwatch</p>
  </footer>
</body>
</html>
